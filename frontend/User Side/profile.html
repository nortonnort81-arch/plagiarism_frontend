<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile - PlagiCheck</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <style id="app-loading-style">
    body.app-loading {
      background: #f5f7fb;
    }
    body.app-loading > * {
      opacity: 0;
    }
    body.app-loading::before {
      content: 'Loading...';
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Nunito', sans-serif;
      font-size: 1rem;
      font-weight: 800;
      letter-spacing: 0.02em;
      color: #3d7042;
      background: #f5f7fb;
      z-index: 9999;
    }
  </style>
</head>
<body class="app-loading">
  <!-- Left Sidebar Navigation (Desktop) -->
  <nav class="sidebar-nav">
    <div class="sidebar-logo">
      <img src="images/logo.png" alt="PlagiCheck Logo">
      <span class="sidebar-logo-text">Plagi<span>Check</span></span>
    </div>
    
    <ul class="sidebar-menu">
      <li>
        <a href="home.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/>
            <polyline points="9 21 9 12 15 12 15 21"/>
          </svg>
          Home
        </a>
      </li>
      <li>
        <a href="scan.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          Scan
        </a>
      </li>
      <li>
        <a href="history.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="12 6 12 12 16 14"/>
          </svg>
          History
        </a>
      </li>
      <li>
        <a href="profile.html" class="active">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="8" r="4"/>
            <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
          </svg>
          Profile
        </a>
      </li>
    </ul>
  </nav>

  <!-- Main Content with Sidebar -->
  <div class="main-with-sidebar">
    <main class="main-content">
      <div class="container container-sm">
        <!-- Profile Header -->
        <div class="profile-header">
          <div class="profile-avatar">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="8" r="4"/>
              <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
            </svg>
          </div>
          <h2 class="profile-name">Hi, John!</h2>
          <p class="profile-email">john.doe@gmail.com</p>
        </div>

        <!-- Personal Details Section -->
        <div class="profile-section">
          <h3 class="profile-section-title">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="8" r="4"/>
              <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
            </svg>
            Personal Details
          </h3>

          <div class="profile-info-item">
            <span class="profile-info-label">First name:</span>
            <span class="profile-info-value">John</span>
          </div>

          <div class="profile-info-item">
            <span class="profile-info-label">Last name:</span>
            <span class="profile-info-value">Doe</span>
          </div>

          <div class="profile-info-item">
            <span class="profile-info-label">Email Address:</span>
            <span class="profile-info-value">john.doe@gmail.com</span>
          </div>
        </div>

        <!-- Password Section -->
        <div class="profile-section">
          <h3 class="profile-section-title">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            Password
          </h3>

          <button class="btn btn-primary btn-full" data-modal="change-password-modal">
            Change password
          </button>
        </div>

        <!-- Logout Button -->
        <a href="../login.html" class="btn btn-red btn-full btn-lg" onclick="handleLogout()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          Logout
        </a>
      </div>
    </main>

    <!-- Bottom Navigation (Mobile) -->
    <nav class="bottom-nav mobile-only">
      <a href="home.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/>
          <polyline points="9 21 9 12 15 12 15 21"/>
        </svg>
        <span class="nav-label">Home</span>
      </a>
      <a href="scan.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <span class="nav-label">Scan</span>
      </a>
      <a href="history.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <polyline points="12 6 12 12 16 14"/>
        </svg>
        <span class="nav-label">History</span>
      </a>
      <a href="profile.html" class="nav-item active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="8" r="4"/>
          <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
        </svg>
        <span class="nav-label">Profile</span>
      </a>
    </nav>
  </div>

  <!-- Change Password Modal -->
  <div id="change-password-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <div class="modal-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </div>
        <h3 class="modal-title">Change Password?</h3>
      </div>

      <form>
        <div class="form-group">
          <label class="form-label">New password</label>
          <input type="password" class="form-input" placeholder="Enter new password" required>
        </div>

        <div class="form-group">
          <label class="form-label">Confirm</label>
          <input type="password" class="form-input" placeholder="Confirm new password" required>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-modal-close>Cancel</button>
          <button type="submit" class="btn btn-primary" data-modal="success-modal" onclick="document.getElementById('change-password-modal').classList.remove('active'); return false;">
            Change password
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- Success Modal -->
  <div id="success-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <div class="modal-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
            <polyline points="22 4 12 14.01 9 11.01"/>
          </svg>
        </div>
        <h3 class="modal-title">Success</h3>
      </div>

      <p style="margin-bottom: 1.5rem;">Your password has changed!</p>

      <button class="btn btn-primary btn-full" data-modal-close>
        Confirm
      </button>
    </div>
  </div>

  <script src="js/script.js?v=3"></script>
  <script src="../assets/app.js?v=23"></script>
</body>
</html>
