<!DOCTYPE html>
<html lang="en">
<head>

  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">

  <style id="app-loading-style">
    body.app-loading {

      justify-content: center;

      font-size: 1rem;
      font-weight: 800;
      letter-spacing: 0.02em;

      background: #f5f7fb;
      z-index: 9999;
    }
  </style>
</head>
<body class="app-loading">
  <nav class="navbar-simple">
    <div class="navbar-container">
      <a href="index.html" class="navbar-logo">
        <img src="User Side/images/logo.png" alt="PlagiCheck Logo">
        <span class="logo-text">Plagi<span>Check</span></span>
      </a>
    </div>
  </nav>

  <div class="welcome-screen">
    <div class="welcome-logo">
      <img src="User Side/images/logo.png" alt="PlagiCheck Logo">
    </div>
    <h1 class="welcome-title">Welcome to <span>PlagiCheck</span>!</h1>

      Stay original and write with confidence. PlagiCheck quickly detects unoriginal content

    </p>
    <div class="welcome-actions">
      <a href="login.html" class="btn btn-primary btn-lg">Log-in</a>
      <a href="register.html" class="btn btn-outline btn-lg">Register</a>
