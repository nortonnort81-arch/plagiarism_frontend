<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scan - PlagiCheck</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <style id="app-loading-style">
    body.app-loading {
      background: #f5f7fb;
    }
    body.app-loading > * {
      opacity: 0;
    }
    body.app-loading::before {
      content: 'Loading...';
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Nunito', sans-serif;
      font-size: 1rem;
      font-weight: 800;
      letter-spacing: 0.02em;
      color: #3d7042;
      background: #f5f7fb;
      z-index: 9999;
    }
  </style>
</head>
<body class="app-loading">
  <!-- Left Sidebar Navigation (Desktop) -->
  <nav class="sidebar-nav">
    <div class="sidebar-logo">
      <img src="images/logo.png" alt="PlagiCheck Logo">
      <span class="sidebar-logo-text">Plagi<span>Check</span></span>
    </div>
    
    <ul class="sidebar-menu">
      <li>
        <a href="home.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/>
            <polyline points="9 21 9 12 15 12 15 21"/>
          </svg>
          Home
        </a>
      </li>
      <li>
        <a href="scan.html" class="active">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          Scan
        </a>
      </li>
      <li>
        <a href="history.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="12 6 12 12 16 14"/>
          </svg>
          History
        </a>
      </li>
      <li>
        <a href="profile.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="8" r="4"/>
            <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
          </svg>
          Profile
        </a>
      </li>
    </ul>
  </nav>

  <!-- Main Content with Sidebar -->
  <div class="main-with-sidebar">
    <main class="main-content">
      <div class="scan-container container-sm">
        <p class="scan-instructions">
          Paste or upload your text below to scan for plagiarism and check the originality of your work.
        </p>

        <!-- Text Input Card -->
        <div class="scan-input-card">
          <div class="form-group">
            <label class="form-label">Type, Paste, or Upload your text here.</label>
            <textarea 
              id="scan-text"
              class="form-textarea" 
              placeholder="Paste or type your text here to scan for plagiarism..."
            ></textarea>
            <div id="word-count" class="word-count">0/25000 words</div>
          </div>

          <!-- Two Buttons Side by Side -->
          <div class="scan-actions">
            <button class="btn btn-primary" id="scan-button">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;">
                <circle cx="11" cy="11" r="8"/>
                <line x1="21" y1="21" x2="16.65" y2="16.65"/>
              </svg>
              Scan Text
            </button>
            <button class="btn btn-outline" id="upload-file-button" type="button">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="17 8 12 3 7 8"/>
                <line x1="12" y1="3" x2="12" y2="15"/>
              </svg>
              Upload File
            </button>
            <input type="file" id="file-input" accept=".txt,.doc,.docx,.pdf" style="display: none;">
          </div>
        </div>
      </div>
    </main>

    <!-- Bottom Navigation (Mobile) -->
    <nav class="bottom-nav mobile-only">
      <a href="home.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/>
          <polyline points="9 21 9 12 15 12 15 21"/>
        </svg>
        <span class="nav-label">Home</span>
      </a>
      <a href="scan.html" class="nav-item active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <span class="nav-label">Scan</span>
      </a>
      <a href="history.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <polyline points="12 6 12 12 16 14"/>
        </svg>
        <span class="nav-label">History</span>
      </a>
      <a href="profile.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="8" r="4"/>
          <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
        </svg>
        <span class="nav-label">Profile</span>
      </a>
    </nav>
  </div>

  <!-- Scan Results Modal -->
  <div id="scan-results-modal" class="scan-modal">
    <div class="scan-modal-overlay"></div>
    <div class="scan-modal-content">
      <div class="scan-modal-header">
        <h3>Scan Complete</h3>
      </div>
      
      <div class="scan-modal-body">
        <!-- Left Side: Circular Progress -->
        <div class="scan-progress-section">
          <div class="circular-progress">
            <svg class="progress-ring" width="160" height="160">
              <circle class="progress-ring-circle-bg" cx="80" cy="80" r="70" />
              <circle class="progress-ring-circle" cx="80" cy="80" r="70" />
            </svg>
            <div class="progress-text">
              <div class="progress-percentage">88%</div>
              <div class="progress-label">Plagiarized</div>
            </div>
          </div>
        </div>

        <!-- Right Side: Score Breakdown -->
        <div class="scan-scores-section">
          <div class="score-item plagiarized-score">
            <div class="score-icon">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/>
                <line x1="15" y1="9" x2="9" y2="15"/>
                <line x1="9" y1="9" x2="15" y2="15"/>
              </svg>
            </div>
            <div class="score-info">
              <div class="score-label">Plagiarized Sentences</div>
              <div class="score-value">88%</div>
            </div>
          </div>

          <div class="score-item unique-score">
            <div class="score-icon">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                <polyline points="22 4 12 14.01 9 11.01"/>
              </svg>
            </div>
            <div class="score-info">
              <div class="score-label">Unique Sentences</div>
              <div class="score-value">12%</div>
            </div>
          </div>
        </div>
      </div>

      <!-- Modal Actions -->
      <div class="scan-modal-actions">
        <button class="btn btn-outline" id="cancel-scan">Cancel</button>
        <button class="btn btn-primary" id="view-details">View Details</button>
      </div>
    </div>
  </div>

  <script src="../assets/app.js?v=23"></script>
</body>
</html>
